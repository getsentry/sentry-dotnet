name: 🐞 Bug Report
description: Tell us about something that's not working the way we (probably) intend.
labels: [".NET", "Bug"]
body:
  - type: markdown
    attributes:
      value: |-
        Before filling in this form, please check if a similar issue already exists.
        If you need help creating a minimal reproduction, see our [repro guide](https://github.com/getsentry/sentry-dotnet/blob/main/.github/repro.md).
  - type: dropdown
    id: nuget
    attributes:
      description: NuGet Package
      label: Package
      options:
        - Sentry
        - Sentry.AspNetCore
        - Sentry.AspNetCore.Blazor.WebAssembly
        - Sentry.AspNetCore.Grpc
        - Sentry.AspNet
        - Sentry.DiagnosticSource
        - Sentry.EntityFramework
        - Sentry.Extensions.AI
        - Sentry.Extensions.Logging
        - Sentry.Google.Cloud.Functions
        - Sentry.Hangfire
        - Sentry.Log4Net
        - Sentry.Maui
        - Sentry.NLog
        - Sentry.OpenTelemetry
        - Sentry.Profiling
        - Sentry.Serilog
        - Other
    validations:
      required: true

  - type: dropdown
    id: dotnet_flavor
    attributes:
      description: .NET Flavor
      label: .NET Flavor
      options:
        - .NET
        - .NET Core
        - .NET Framework
        - IL2CPP
        - Mono
        - Other
    validations:
      required: true

  - type: input
    id: dotnet_version
    attributes:
      label: .NET Version
      description: If using .NET Core, please copy the output of 'dotnet --version' here
      placeholder: 10.0.100 ← should look like this
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: OS
      description: Operating System
      options:
        - Android
        - Browser
        - macOS
        - iOS
        - Linux
        - Windows
        - Any (not platform specific)
        - Other
    validations:
      required: true

  - type: input
    id: os_version
    attributes:
      label: OS Version
      description: Operating System Version

  - type: dropdown
    id: ide
    attributes:
      label: Development Environment
      description: What development environment are you using
      options:
        - Visual Studio v18.x
        - Visual Studio Code (Windows)
        - Visual Studio Code (macOS)
        - Visual Studio Code (Linux)
        - Rider 2025.x (Windows)
        - Rider 2025.x (macOS)
        - Rider 2025.x (Linux)
        - Other
    validations:
      required: true

  - type: dropdown
    id: other_error_monitoring
    attributes:
      description: Are you using any other error monitoring solution alongside Sentry?
      label: Other Error Monitoring Solution
      options:
        - "Yes"
        - "No"
    validations:
      required: true

  - type: input
    id: other_error_monitoring_name
    attributes:
      label: Other Error Monitoring Solution Name
      description: If you're using another error monitoring solution side-by-side, please enter the name of the other solution.
    validations:
      required: false

  - type: input
    id: sentry_sdk_version
    attributes:
      label: SDK Version
      description: Sentry SDK Version
      placeholder: 6.0.0 ← should look like this
    validations:
      required: true

  - type: input
    id: sentry_version
    attributes:
      label: Self-Hosted Sentry Version
      description: Leave blank if using sentry.io
    validations:
      required: false

  - type: textarea
    id: workloadset
    attributes:
      label: Workload Versions
      description: If using .NET Core, please copy/paste the output of 'dotnet workload list' here
    validations:
      required: true

  - type: textarea
    id: sentryuse
    attributes:
      label: UseSentry or SentrySdk.Init call
      description: Please include the block of code used in UseSentry or SentrySdk.Init - please blank out your DSN
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to Reproduce
      description: >-
        How can we see what you're seeing? Specific is terrific. Ideally, please provide a link
        to a minimal reproduction project on GitHub. See our
        [repro guide](https://github.com/getsentry/sentry-dotnet/blob/main/.github/repro.md)
        for tips on creating one.
      placeholder: |-
        1. foo
        2. bar
        3. baz
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Result
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Result
      description: Logs? Screenshots?
    validations:
      required: true

  - type: markdown
    attributes:
      value: |-
        ## Thanks 🙏
        Check our [triage docs](https://open.sentry.io/triage/) for what to expect next.
