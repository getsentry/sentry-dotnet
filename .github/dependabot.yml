version: 2
updates:
- package-ecosystem: "dotnet-sdk"
  directory: "/"
  schedule:
    interval: "weekly"
  open-pull-requests-limit: 1

- package-ecosystem: nuget
  directory: "/samples"
  schedule:
    interval: monthly
  open-pull-requests-limit: 2

- package-ecosystem: nuget
  directory: "/test"
  schedule:
    interval: weekly
  open-pull-requests-limit: 2

- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: weekly
