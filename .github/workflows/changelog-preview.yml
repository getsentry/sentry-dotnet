name: Changelog Preview
on:
  pull_request_target:
    types:
    - opened
    - synchronize
    - reopened
    - edited
    - labeled
    - unlabeled
permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  changelog-preview:
    if: false
    uses: getsentry/craft/.github/workflows/changelog-preview.yml@70714dda896a3f5d5ad0a3e55b1d73a64ee7bf8f # 2.26.4
    secrets: inherit
