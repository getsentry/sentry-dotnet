name: Changelog Preview
on:
  pull_request_target:
    types:
    - opened
    - synchronize
    - reopened
    - edited
    - labeled
    - unlabeled
permissions:
  contents: read
  pull-requests: write
  statuses: write

jobs:
  changelog-preview:
    if: false
    uses: getsentry/craft/.github/workflows/changelog-preview.yml@9a8e27a89529970cc0f241c6b77fdcbc32838c03 # 2.25.3
    secrets: inherit
